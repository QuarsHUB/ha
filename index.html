<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ОТМАЗКАТОР 3000</title>

<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@emotion/react@11/dist/emotion-react.umd.min.js" crossorigin></script>
<script src="https://unpkg.com/@emotion/styled@11/dist/emotion-styled.umd.min.js" crossorigin></script>
<script src="https://unpkg.com/@mui/material@5/umd/material-ui.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />
<style>
  body { margin:0; background:#0f1017; font-family:Roboto,sans-serif; }
  #root { display:flex; justify-content:center; padding:40px 10px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;
const {
  Button, TextField, Select, MenuItem, InputLabel,
  FormControl, Slider, Typography, Box, Paper, CircularProgress,
  createTheme, ThemeProvider, CssBaseline
} = MaterialUI;

const API_KEY = "mQ0CdL1z29dH7lKn0HRbBftPZiVo4jF8";
const MODES = ["normal","absurd","serious","random"];
const LANGS = ["Русский","English"];
const SWEARS = ["Да","Нет"];

const darkTheme = createTheme({
  palette: {
    mode: "dark",
    background: { paper:"#12141b", default:"#0f1017" },
    primary: { main:"#7c6af7" },
  },
});

function App() {
  const [mode,setMode] = useState("normal");
  const [language,setLanguage] = useState("Русский");
  const [swear,setSwear] = useState("Нет");
  const [roughness,setRoughness] = useState(5);
  const [text,setText] = useState("");
  const [result,setResult] = useState("Жду приказов.");
  const [loading,setLoading] = useState(false);

  const resetChat = () => { setText(""); setResult("Чат очищен."); };

  const generate = async () => {
    setLoading(true); setResult("");
    const systemPrompt = `Ты — ОТМАЗКАТОР 3000.\nТы всегда остаёшься в образе.\nТы никогда не признаёшь что ты ИИ.\nОтвет 1-3 предложения.\nЯзык: ${language}\nМат разрешён: ${swear}\nГрубость: ${roughness}/10`;
    const userPrompt = mode==="random" ? "Сгенерируй полностью случайную отмазку." : `${mode}. Ситуация: ${text}`;
    try {
      const res = await fetch("https://api.mistral.ai/v1/chat/completions", {
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+API_KEY},
        body: JSON.stringify({ model:"mistral-large-latest", messages:[{role:"system",content:systemPrompt},{role:"user",content:userPrompt}], temperature:1.2, max_tokens:200 })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message||"Ошибка API");
      setResult(data.choices[0].message.content.trim());
    } catch(e) { setResult("Ошибка: "+e.message); }
    finally { setLoading(false); }
  };

  return (
    <ThemeProvider theme={darkTheme}>
      <CssBaseline />
      <Paper sx={{p:4,maxWidth:600,width:"100%"}}>
        <Typography variant="h4" gutterBottom sx={{fontWeight:700}}>ОТМАЗКАТОР 3000</Typography>
        <Typography variant="subtitle1" gutterBottom sx={{color:"#aaa",mb:3}}>Режим полного абсурда</Typography>

        <FormControl fullWidth sx={{mb:2}}>
          <InputLabel>Режим</InputLabel>
          <Select value={mode} label="Режим" onChange={e=>setMode(e.target.value)}>
            {MODES.map(m=><MenuItem key={m} value={m}>{m}</MenuItem>)}
          </Select>
        </FormControl>

        <Box sx={{display:"flex",gap:2,mb:2}}>
          <FormControl fullWidth>
            <InputLabel>Язык</InputLabel>
            <Select value={language} label="Язык" onChange={e=>setLanguage(e.target.value)}>
              {LANGS.map(l=><MenuItem key={l} value={l}>{l}</MenuItem>)}
            </Select>
          </FormControl>
          <FormControl fullWidth>
            <InputLabel>Мат</InputLabel>
            <Select value={swear} label="Мат" onChange={e=>setSwear(e.target.value)}>
              {SWEARS.map(s=><MenuItem key={s} value={s}>{s}</MenuItem>)}
            </Select>
          </FormControl>
        </Box>

        <Box sx={{mb:2}}>
          <Typography gutterBottom>Грубость: {roughness}</Typography>
          <Slider min={1} max={10} value={roughness} onChange={(e,v)=>setRoughness(v)} valueLabelDisplay="auto"/>
        </Box>

        <TextField label="Опиши ситуацию" multiline rows={4} fullWidth value={text} onChange={e=>setText(e.target.value)} sx={{mb:2}}/>

        <Box sx={{display:"flex",gap:2,mb:2}}>
          <Button variant="contained" fullWidth onClick={generate} disabled={loading||(!text&&mode!=="random")}>СГЕНЕРИРОВАТЬ</Button>
          <Button variant="outlined" fullWidth onClick={resetChat}>НОВЫЙ ЧАТ</Button>
        </Box>

        {loading
          ? <CircularProgress sx={{display:"block",m:"auto",mt:2}}/>
          : <Box sx={{mt:2,p:2,bgcolor:"#0f1017",borderRadius:2,minHeight:80,fontSize:"1rem",lineHeight:1.6}}>{result}</Box>}
      </Paper>
    </ThemeProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
